name: Qrisp unit tests via Pytest - xdist + cache with pyproject dependencies

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11.*", "3.12.*"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit # Enable Harden-Runner in audit mode for outbound traffic visibility.

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./
          pip install --group test

      - name: Run tests on Linux/macOS
        if: runner.os != 'Windows'
        run: pytest -n auto # -n auto allows us to parallelize the unit tests across multiple runners

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: pytest -vv -n auto ./tests \
          --ignore=tests/interface_tests/test_converter_qrisp_to_qml.py \
          --ignore=tests/jax_tests/test_catalyst_interface.py
