name: Qrisp unit tests via Pytest - xdist + cache with pyproject dependencies

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix:
        python-version: ["3.11.*"]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./
          pip install --group test

      - name: Run tests with pytest
        run: pytest -n auto \
          --deselect=tests/operators_tests/test_qubit_hamiltonian_simulation.py::test_qubit_hamiltonian_simulation \
          --deselect=tests/primitives_tests/arithmetic_tests/test_remaud_adder.py::test_remaud_adder \
          --deselect=tests/jax_tests/test_HHL_demo.py::test_HHL_demo \
          --deselect=tests/primitives_tests/arithmetic_tests/test_modular_arithmetic.py::test_modular_arithmetic \
          --deselect=tests/algorithms_tests/qaoa_tests/test_QAOA_TQA_warm_start.py::test_TQA_warmstart \
          --deselect=tests/primitives_tests/arithmetic_tests/test_qcla.py::test_cq_carry_generation \
          --deselect=tests/primitives_tests/arithmetic_tests/test_remaud_adder.py::test_remaud_adder_standard \
          --deselect=tests/algorithms_tests/qaoa_tests/test_QAOAminSetCover.py::test_QAOAminSetCover \
          --deselect=tests/jax_tests/test_montgomery.py::test_montgomery_find_order \
          --deselect=tests/primitives_tests/arithmetic_tests/test_quantum_arithmetic.py::test_quantum_arithmetic \
          --deselect=tests/primitives_tests/arithmetic_tests/test_qcla.py::test_cq_qcla_adder \
          --deselect=tests/jax_tests/test_boolean_simulation.py::test_boolean_simulation \
          --deselect=tests/algorithms_tests/test_QITE_heisenberg.py::test_qite_heisenberg \
          --deselect=tests/algorithms_tests/qaoa_tests/test_QAOAmaxIndepSet.py::test_QAOAmaxIndepSet \
          --deselect=tests/jax_tests/test_jasp_hamiltonian_simulation.py::test_jasp_hamiltonian_simulation_H2 \
          --deselect=tests/primitives_tests/arithmetic_tests/test_qcla.py::test_qq_carry_generation \
          --deselect=tests/jax_tests/test_jasp_comparisons.py::test_comparisons \
          --deselect=tests/jax_tests/test_jasp_q_switch.py::test_jasp_q_switch_function_control \
          --deselect=tests/jax_tests/test_jasp_qswitch.py::test_jasp_qswitch_function_control \
          --deselect=tests/core_tests/mcx_tests/test_khattar_mcx.py::test_khattar_dyn
